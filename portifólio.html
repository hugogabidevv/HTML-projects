<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Portfólio</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
    }

    header {
        text-align: center;
        padding: 60px 20px;
    }

    header h1 {
        font-size: 40px;
        margin-bottom: 10px;
    }

    header p {
        color: #38bdf8;
        font-size: 18px;
    }

    section {
        max-width: 900px;
        margin: auto;
        padding: 30px 20px;
    }

    h2 {
        margin-bottom: 15px;
        color: #38bdf8;
        border-left: 4px solid #38bdf8;
        padding-left: 10px;
    }

    .projetos {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 15px;
        transition: 0.3s;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card h3 {
        margin-bottom: 10px;
        color: #38bdf8;
    }

    .contato {
        text-align: center;
    }

    footer {
        text-align: center;
        padding: 20px;
        color: #94a3b8;
        font-size: 14px;
    }

</style>

</head>
<body>

<header>
    <h1>HugoDevv</h1>
    <p>desenvolvedor</p>
</header>

<section class="sobre">
    <h2>Sobre mim</h2>
    <p>Sou um desenvolvedor iniciante.</p>
</section>

<section>
    <h2>Projetos</h2>
    <div class="projetos">
        <div class="card">
            <h3>Project 1</h3>
            <p>Jogo 2D feito em Python.</p>
        </div>

        <div class="card">
            <h3>Projeto 2</h3>
            <p>Calculadora web .</p>
        </div>

        <div class="card">
            <h3>Projeto 3</h3>
            <p>Interface de Login.</p>
        </div>
    </div>
</section>

<section class="contato">
    <h2>Contato</h2>
    <p>Email: seuemail@gmail.com</p>
</section>

<footer>
    © 2026 - HugoDevv
</footer>

</body>
</html>
